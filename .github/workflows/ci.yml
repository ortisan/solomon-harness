name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Custom Scripts and Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check solomon_harness tests

      - name: Typecheck with mypy
        run: uv run mypy solomon_harness tests

      - name: Run Python test suite
        run: uv run pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Install Node dependencies
        run: |
          cd ui
          npm ci

      - name: Lint Next.js app
        run: |
          cd ui
          npm run lint

      - name: Typecheck and Build Next.js app
        run: |
          cd ui
          npm run build

      - name: Run Next.js test suite
        run: |
          cd ui
          npm run test
