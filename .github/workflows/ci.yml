name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Custom Scripts and Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f67e10fa7b7bc0ca204e65d21a2c4aa029f64a22 # v5.1.1
        with:
          python-version: '3.10'

      - name: Check bash script syntax
        run: |
          bash -n scripts/bootstrap-agent.sh scripts/scrum-master.sh scripts/wiki-sync.sh scripts/spawn-agent.sh scripts/test-spawn-agent.sh

      - name: Check python script syntax
        run: |
          python3 -m py_compile scripts/git-hooks/commit-msg

      - name: Install ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts with ShellCheck
        run: |
          shellcheck scripts/bootstrap-agent.sh scripts/scrum-master.sh scripts/wiki-sync.sh scripts/spawn-agent.sh scripts/test-spawn-agent.sh

      - name: Run script dry-runs and validation
        run: |
          ./scripts/scrum-master.sh --dry-run backlog-list
          ./scripts/scrum-master.sh --dry-run milestone-list
          ./scripts/scrum-master.sh --dry-run issue-create "Verification Test" "feature"
          ./scripts/test-spawn-agent.sh

      - name: Verify workspace configuration files
        run: |
          ./scripts/bootstrap-agent.sh
          git diff --exit-code
