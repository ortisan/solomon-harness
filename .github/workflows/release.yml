name: Release

# CI is the single owner of tags and published GitHub Releases. A release ships
# in two halves, both anchored to main:
#   - pr-guards: runs on EVERY pull_request to main (never skipped, so it is a
#     real required check). On a `chore/release-*` prep PR it runs the fail-closed
#     `release check` (tag == pyproject.version == top CHANGELOG heading, tag
#     unused); on any other PR it asserts the diff does not hand-edit the version
#     or add a CHANGELOG heading (those belong only to `release prep`). Tests and
#     ruff are the separate ci.yml gate, not this job.
#   - release: fires only when a prep PR has merged to main (its commit subject
#     is exactly `chore(release): vX.Y.Z`; the repo squash-merges, so the squash
#     subject is the prep PR title). It derives the version, recomputes the
#     release window against the just-pushed main HEAD (catching a commit that
#     landed on main after the prep PR opened but before it merged), verifies
#     the pinned action SHAs resolve, tags it, and publishes the Release. There
#     is no `gh release create` in the skill and no tag-push trigger, which
#     removes the published-manual vs draft-auto race (issue #34).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least privilege by default; the release job widens to contents: write to push
# the tag (tags are not branch-protected, so the default GITHUB_TOKEN suffices).
permissions:
  contents: read

jobs:
  release:
    name: Tag and publish GitHub Release
    # Only on a merged release-prep PR: the resulting main push carries the
    # `chore(release): vX.Y.Z` commit. On pull_request events head_commit is
    # null, so this never fires on a PR.
    if: "github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release): v')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          # A shallow clone has no tag context, so the existing-tag assertion and
          # the annotated tag both fail fast (~6s). Fetch full history and tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Derive version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+[^"]*)".*/\1/p' pyproject.toml | head -n1)"
          if [ -z "$version" ]; then
            echo "Could not read a version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: v$version"

      - name: Assert tag does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally; published tags are immutable and never moved." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; refusing to re-tag." >&2
            exit 1
          fi

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Recompute the release window against the just-pushed main HEAD
        # A feat/fix commit that landed on main after the prep PR opened but
        # before it merged is otherwise silently dropped from the changelog
        # and the release window: `release check` on the PR only proved the
        # PR's own pyproject.toml/CHANGELOG.md/tag agreed with each other, not
        # that they still match main's actual history at merge time. Abort the
        # tag rather than publish one with a stale changelog.
        run: uv run python -m solomon_harness.cli release verify-window

      - name: Extract changelog section for release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "${notes_file}"
          if [ ! -s "${notes_file}" ]; then
            echo "No CHANGELOG.md section found for [${VERSION}]" >&2
            exit 1
          fi
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Verify pinned action SHAs resolve
        # Done BEFORE the tag is pushed: a corrupted/unresolvable action pin must
        # fail here, not at the Publish step after an immutable tag already exists
        # (which would leave a dangling tag the Assert step then blocks on retry).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for pin in \
            "actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332" \
            "softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda"; do
            repo="${pin%@*}"; sha="${pin#*@}"
            if ! gh api "repos/${repo}/commits/${sha}" --jq .sha >/dev/null 2>&1; then
              echo "Pinned action SHA does not resolve: ${pin}" >&2
              exit 1
            fi
          done
          echo "All pinned action SHAs resolve."

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-guards:
    name: Release guards on PRs to main
    # Runs on EVERY pull_request to main. The branch decision lives INSIDE the
    # steps, not in a job-level `if`, because a job skipped by `if` is reported as
    # a passing required check — which would make the fail-closed gate bypassable.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          # `release check` asserts the target tag does not yet exist, and the
          # drift guard diffs against the base, so both need full history + tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # uv provisions a Python interpreter matching pyproject's requires-python
        # (>=3.10), so no separate setup-python action is needed and every pinned
        # GitHub Action in this file stays SHA-pinned.
        run: uv sync --group dev

      - name: Release-prep gate, or non-release drift guard
        # [tool.uv] package = false, so `uv sync` does not install the
        # `solomon-harness` console script; invoke the module directly.
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [[ "${HEAD_REF}" == chore/release-* ]]; then
            echo "Release-prep PR: running the fail-closed release check."
            uv run python -m solomon_harness.cli release check
            echo "Asserting the prep PR touches only pyproject.toml + CHANGELOG.md."
            git fetch origin "${BASE_REF}" -q
            uv run python -m solomon_harness.cli release check-footprint --base "origin/${BASE_REF}"
          else
            echo "Non-release PR: asserting it does not hand-edit the version or add a CHANGELOG heading."
            git fetch origin "${BASE_REF}" -q
            base="origin/${BASE_REF}"
            if git diff "${base}...HEAD" -- pyproject.toml | grep -qE '^[+-]version = '; then
              echo "This PR edits the pyproject.toml 'version =' line. A version bump belongs only to a chore/release-* prep PR (solomon-harness release prep)." >&2
              exit 1
            fi
            if git diff "${base}...HEAD" -- CHANGELOG.md | grep -qE '^\+## \[[0-9]+\.[0-9]+\.[0-9]+\]'; then
              echo "This PR adds a CHANGELOG version heading. Changelog sections are written only by release prep." >&2
              exit 1
            fi
            echo "OK: no version or CHANGELOG-heading drift."
          fi
