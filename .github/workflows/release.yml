name: Release

# CI is the single owner of tags and published GitHub Releases. A release ships
# in two halves, both anchored to main:
#   - release-check: gates every `chore/release-*` prep PR before it can merge,
#     running `solomon-harness release check` (tag == pyproject.version == top
#     CHANGELOG heading, tag unused, tests + ruff green). Fail-closed.
#   - release: fires only when a prep PR has merged to main (its commit subject
#     is exactly `chore(release): vX.Y.Z`). It derives the version, tags it, and
#     publishes the Release. There is no `gh release create` in the skill and no
#     tag-push trigger, which removes the published-manual vs draft-auto race
#     (issue #34).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least privilege by default; the release job widens to contents: write to push
# the tag (tags are not branch-protected, so the default GITHUB_TOKEN suffices).
permissions:
  contents: read

jobs:
  release:
    name: Tag and publish GitHub Release
    # Only on a merged release-prep PR: the resulting main push carries the
    # `chore(release): vX.Y.Z` commit. On pull_request events head_commit is
    # null, so this never fires on a PR.
    if: "github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release): v')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          # A shallow clone has no tag context, so the existing-tag assertion and
          # the annotated tag both fail fast (~6s). Fetch full history and tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Derive version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+[^"]*)".*/\1/p' pyproject.toml | head -n1)"
          if [ -z "$version" ]; then
            echo "Could not read a version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: v$version"

      - name: Assert tag does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally; published tags are immutable and never moved." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; refusing to re-tag." >&2
            exit 1
          fi

      - name: Extract changelog section for release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "${notes_file}"
          if [ ! -s "${notes_file}" ]; then
            echo "No CHANGELOG.md section found for [${VERSION}]" >&2
            exit 1
          fi
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb77c0abf8aa5b2ef267fda # v2.0.6
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-check:
    name: Validate release prep PR
    # Fail-closed gate on every release-prep PR: an inconsistent prep cannot merge.
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'chore/release-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          # `release check` asserts the target tag does not yet exist, so it
          # needs full history and tag context too.
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # uv provisions a Python interpreter matching pyproject's requires-python
        # (>=3.10), so no separate setup-python action is needed and every pinned
        # GitHub Action in this file stays SHA-pinned.
        run: uv sync --extra dev

      - name: Run release check
        run: uv run solomon-harness release check
