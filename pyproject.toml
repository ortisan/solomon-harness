[project]
name = "solomon-harness"
version = "0.1.0"
description = "Multi-agent software-development harness with a SurrealDB/SQLite memory layer."
requires-python = ">=3.10"
dependencies = [
    # Primary memory backend. The client currently targets the legacy synchronous API
    # (connect/signin with user/pass). Reconcile the exact pin against the code in the
    # dedicated SurrealDB-correctness work before treating this as load-bearing.
    "surrealdb>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.5",
    "mypy>=1.10",
]

[tool.uv]
# This repository is an application and a template tree, not an installable package.
package = false

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
