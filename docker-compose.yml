services:
  surrealdb:
    # SurrealDB v3 (latest). The Python SDK is pinned surrealdb>=2.0.0,<3.0.0,
    # which speaks the v2.0.0-v3.1.4 protocol. Pin to a specific v3.x tag for
    # reproducibility once validated against a live server.
    image: surrealdb/surrealdb:latest
    container_name: solomon_surrealdb
    ports:
      # Host port 8099 (8000 is too contended); the harness re-templates this to
      # the auto-assigned port. The container always listens on 8000 internally.
      - "8099:8000"
    volumes:
      - ./memory/surrealdb:/data
    # SurrealDB v3: --username/--password (v2+ renamed --user/--pass) and the
    # rocksdb store ("file:" was removed in v2).
    command: start --username root --password root --log info rocksdb:/data/solomon.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealist:
    image: surrealdb/surrealist:latest
    container_name: solomon_surrealist
    ports:
      - "3000:80"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped

  spectron:
    image: ghcr.io/surrealdb/spectron:latest
    container_name: solomon_spectron
    ports:
      - "9090:9090"
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SPECTRON_SURREALDB_URL: ws://surrealdb:8000
      SPECTRON_SURREALDB_USER: root
      SPECTRON_SURREALDB_PASS: root
      SPECTRON_OBJECT_STORE: local:///memory/spectron/objects
      SPECTRON_BIND: 0.0.0.0:9090
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./memory/spectron:/memory/spectron
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
