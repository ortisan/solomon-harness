services:
  surrealdb:
    # Pinned to a validated v3 tag for reproducibility (the Python SDK is
    # surrealdb>=2.0.0,<3.0.0, which speaks the v2.0.0-v3.x protocol). Bump
    # deliberately rather than tracking :latest, which could jump to a new major.
    image: surrealdb/surrealdb:v3.1.5
    container_name: solomon_surrealdb
    ports:
      # Host port 8099 (8000 is too contended); the harness re-templates this to
      # the auto-assigned port. The container always listens on 8000 internally.
      - "8099:8000"
    volumes:
      - ./memory/surrealdb:/data
    # SurrealDB v3: --username/--password (v2+ renamed --user/--pass) and the
    # rocksdb store ("file:" was removed in v2).
    command: start --username root --password root --log info rocksdb:/data/solomon.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealist:
    image: surrealdb/surrealist:latest
    container_name: solomon_surrealist
    ports:
      - "3000:80"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped


