services:
  surrealdb:
    # Pinned to a validated v3 tag for reproducibility (the Python SDK is
    # surrealdb>=2.0.0,<3.0.0, which speaks the v2.0.0-v3.x protocol). Bump
    # deliberately rather than tracking :latest, which could jump to a new major.
    image: surrealdb/surrealdb:v3.1.5
    container_name: solomon_surrealdb
    ports:
      # Host port 8099 (8000 is too contended); the harness re-templates this to
      # the auto-assigned port. The container always listens on 8000 internally.
      # Bound to loopback as defense in depth: the store holds project memory and
      # must never be reachable from other machines. The install re-templates the
      # --password below to a generated per-machine secret (~/.solomon-harness/
      # credentials.json); root is only the placeholder for a bare local run.
      - "127.0.0.1:8099:8000"
    volumes:
      - ./memory/surrealdb:/data
    environment:
      SURREAL_ROCKSDB_BLOCK_CACHE_SIZE: 268435456 # 256MB
    mem_limit: 512m
    # SurrealDB v3: --username/--password (v2+ renamed --user/--pass) and the
    # rocksdb store ("file:" was removed in v2). --password root is the placeholder
    # the install rewrites to a generated per-machine secret.
    command: start --username root --password root --log info rocksdb:/data/solomon.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  surrealist:
    image: surrealdb/surrealist:latest
    container_name: solomon_surrealist
    ports:
      # Loopback-only for the same reason as the database itself: the admin UI
      # fronts a store secured with the per-machine credential.
      - "127.0.0.1:3000:80"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped


